<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Potato Disease Detection</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #56ab2f, #a8e063);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #219150;
        }

        img {
            margin-top: 20px;
            width: 100%;
            border-radius: 10px;
        }

        .result {
            margin-top: 20px;
            padding: 10px;
            background: #ecf9f1;
            border-radius: 10px;
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🥔 Potato Disease Detection</h2>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="image" required>
        <br>
        <button type="submit">Predict</button>
    </form>

    {% if img_path %}
        <img src="{{ img_path }}" alt="Uploaded Image">
    {% endif %}

    {% if prediction %}
        <div class="result">
            Prediction: {{ prediction }}
        </div>
    {% endif %}
</div>

</body>
</html>
